<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI Llama - Gratis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        header { background: #16213e; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; word-wrap: break-word; }
        .user { background: #3498db; align-self: flex-end; border-bottom-right-radius: 3px; }
        .bot { background: #2c3e50; align-self: flex-start; border-bottom-left-radius: 3px; }
        .input-area { background: #16213e; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #0f3460; color: #fff; outline: none; }
        button { background: #e94560; color: #fff; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
        .loading { text-align: center; padding: 10px; color: #888; }
        footer { background: #16213e; padding: 10px; text-align: center; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <header>🤖 Chat AI Llama - Gratis</header>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">Kirim</button>
    </div>
    <footer>@natedekaka 2026</footer>

    <script>
        const key = String.fromCharCode(103,115,107,95,110,82,78,88,109,54,52,65,84,98,110,74,85,70,102,67,81,111,78,103,87,71,100,121,98,51,70,89,120,57,51,116,73,110,101,100,49,53,83,54,108,77,89,55,90,88,77,80,51,49,108,113);
        const MODEL = "llama-3.3-70b-versatile";
        const URL = "https://api.groq.com/openai/v1/chat/completions";

        function init() {
            addMessage("Halo! Saya AI Assistant Llama. Gratis untuk semua!\nKetik pesan untuk mulai chat...", false);
        }

        function addMessage(text, isUser) {
            const div = document.createElement("div");
            div.className = "message " + (isUser ? "user" : "bot");
            div.textContent = text;
            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        }

        async function send() {
            const input = document.getElementById("msg");
            const btn = document.getElementById("sendBtn");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            btn.disabled = true;
            addMessage(text, true);

            const loading = document.createElement("div");
            loading.className = "loading";
            loading.textContent = "Mengirim...";
            document.getElementById("chat").appendChild(loading);

            try {
                const res = await fetch(URL, {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: text + "\n\nJawab dalam bahasa Indonesia." }], temperature: 0.5, max_completion_tokens: 2048 })
                });
                loading.remove();
                if (res.ok) {
                    const data = await res.json();
                    addMessage(data.choices[0].message.content, false);
                } else {
                    addMessage("Error: " + res.statusText, false);
                }
            } catch (e) {
                loading.remove();
                addMessage("Error: " + e.message, false);
            }
            btn.disabled = false;
            input.focus();
        }

        init();
    </script>
</body>
</html>
